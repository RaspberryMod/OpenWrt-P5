name: RPI5-ULTIMATE-BUILDER

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Upload release?"
        required: false
        default: false
        type: boolean

      default_ip:
        description: "Custom LAN IP"
        required: false
        default: "10.10.1.1"

permissions:
  contents: write

jobs:
  build:
    name: Build RPI5 Firmware
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: wrt

    env:
      UPLOAD_RELEASE: ${{ github.event.inputs.upload_release }}
      DEFAULT_IP: ${{ github.event.inputs.default_ip || '' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Prepare build directory on /mnt
        working-directory: ${{ github.workspace }}
        run: |
          sudo mkdir -p /mnt/build_wrt
          sudo chown $USER:$USER /mnt/build_wrt
          rm -rf wrt
          ln -s /mnt/build_wrt wrt

          echo "Build directory:"
          realpath wrt
          df -hT

      - name: Copy repo files
        working-directory: ${{ github.workspace }}
        run: |
          cp -a source/. wrt/

      - name: Initialize Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox || true
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Kuala_Lumpur"

      - name: Install build dependencies
        run: |
          sudo apt update -y
          sudo apt install -y \
            dos2unix libfuse-dev \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3 python3-setuptools \
            rsync unzip zlib1g-dev file wget curl

      - name: Add extra swap
        run: |
          sudo fallocate -l 8G /swapfile2 || sudo dd if=/dev/zero of=/swapfile2 bs=1M count=8192
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2 || true
          free -h

      - name: Normalize Scripts
        run: |
          echo "Fixing line endings & permissions..."
          find . -type f \( -name "*.sh" -o -name "*.bash" -o -name "*.txt" \) -exec dos2unix {} \;
          find . -type f \( -name "*.sh" -o -name "*.bash" \) -exec chmod +x {} \;
          
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo docker image prune -a -f || true
          sudo apt-get clean
          df -hT

      - name: Clean old build files
        run: |
          rm -rf dl build_dir staging_dir tmp .ccache
          df -hT

      - name: Prepare feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Set LAN IP if provided
        run: |
          FILE="package/base-files/files/bin/config_generate"

          if [ -n "$DEFAULT_IP" ]; then
            echo "Custom LAN IP set: $DEFAULT_IP"
            sed -i "s|192\.168\.1\.1|$DEFAULT_IP|g" "$FILE"
          else
            echo "No custom LAN IP set. Using OpenWrt default: 192.168.1.1"
          fi

          echo "Preview config_generate LAN IP:"
          grep -n "192.168.1.1\|$DEFAULT_IP" "$FILE" || true

      - name: Disable Rust CI LLVM download
        run: |
          if [ -f feeds/packages/lang/rust/Makefile ]; then
            sed -i 's/llvm\.download-ci-llvm=true/llvm.download-ci-llvm=false/g' feeds/packages/lang/rust/Makefile
          fi

      - name: Load RPI5 config
        run: |
          echo "Loading RPI5 base config only..."
          cp .seed .config

      - name: Show final build config preview
        run: |
          echo "===== INPUT PREVIEW ====="
          echo "UPLOAD_RELEASE=$UPLOAD_RELEASE"
          echo "DEFAULT_IP=${DEFAULT_IP:-192.168.1.1}"
          echo "========================="

      - name: Build firmware
        run: |
          make defconfig
          make download -j6 || make download -j1 V=s
          make -j$(nproc) || make -j2 || make -j1 V=s

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPI5-Firmware
          path: wrt/bin/
          retention-days: 7

      - name: Generate tag
        if: ${{ github.event.inputs.upload_release }}
        id: tag
        run: echo "tag=RPI5-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        if: ${{ github.event.inputs.upload_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: RPI5 Firmware ${{ steps.tag.outputs.tag }}
          files: wrt/bin/targets/bcm27xx/bcm2712/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
